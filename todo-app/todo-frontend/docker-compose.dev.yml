services:
  app:
    image: todo-frontend-dev
    container_name: todo-frontend-dev
    build:
      context: .
      dockerfile: dev.Dockerfile
    volumes:
      - ./:/usr/src/app
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:3000/

  debug-helper:
    image: busybox
    container_name: debug-helper